<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Evidencia - CRAI UNEMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a237e; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .card { border-radius: 20px; max-width: 400px; width: 100%; }
        .camera-btn { width: 100%; padding: 3rem; border: 3px dashed #1a237e; border-radius: 16px; background: #f8faff; cursor: pointer; display: block; text-align: center; transition: background 0.2s, border-color 0.2s; }
        .camera-btn:active { background: #eef2ff; border-color: #3949ab; }

        /* Pantalla de carga al enviar la foto */
        #loaderEvidencia {
            position: fixed;
            inset: 0;
            background: rgba(26, 35, 126, 0.92);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.1rem;
            color: #fff;
            z-index: 9999;
            text-align: center;
            padding: 1.5rem;
        }
        #loaderEvidencia.activo { display: flex; }
        .loader-spinner {
            width: 64px;
            height: 64px;
            border: 5px solid rgba(255, 255, 255, 0.25);
            border-top-color: #ff6f00;
            border-radius: 50%;
            animation: loaderGirar 0.9s linear infinite;
        }
        @keyframes loaderGirar { to { transform: rotate(360deg); } }
        .loader-titulo { font-weight: 700; font-size: 1.05rem; margin: 0; }
        .loader-sub { font-size: 0.85rem; opacity: 0.8; margin: 0; }
    </style>
</head>
<body>
    <div class="card shadow p-4 text-center">
        <h5 class="fw-bold mb-3"><i class="bi bi-camera"></i> Evidencia CRAI</h5>
        <p class="text-muted small">Toma una foto clara del equipo</p>
        <form method="POST" enctype="multipart/form-data" id="formEvidencia">
            {% csrf_token %}
            <label class="camera-btn">
                <i class="bi bi-camera" style="font-size: 3rem; color: #1a237e;"></i>
                <p class="mt-2 mb-0 text-muted">Toca para tomar foto</p>
                <input type="file" name="foto" accept="image/*" capture="environment" style="display: none;" id="inputFotoEvidencia">
            </label>
        </form>
        <small class="text-muted mt-3">Esta página expirará en breve</small>
    </div>

    <!-- Pantalla de carga mientras se sube y procesa la foto -->
    <div id="loaderEvidencia">
        <div class="loader-spinner"></div>
        <p class="loader-titulo">Enviando foto…</p>
        <p class="loader-sub">No cierres esta ventana</p>
    </div>

    <script>
        // Al elegir la foto: mostrar la pantalla de carga y enviar el formulario.
        var input = document.getElementById('inputFotoEvidencia');
        var loader = document.getElementById('loaderEvidencia');
        var form = document.getElementById('formEvidencia');
        input.addEventListener('change', function () {
            if (!input.files || !input.files.length) { return; }
            loader.classList.add('activo');
            form.submit();
        });
    </script>
</body>
</html>
