<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Evidencia - CRAI UNEMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a237e; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .card { border-radius: 20px; max-width: 400px; width: 100%; }
        .camera-btn { width: 100%; padding: 3rem; border: 3px dashed #1a237e; border-radius: 16px; background: #f8faff; cursor: pointer; display: block; text-align: center; }
    </style>
</head>
<body>
    <div class="card shadow p-4 text-center">
        <h5 class="fw-bold mb-3">📸 Evidencia CRAI</h5>
        <p class="text-muted small">Toma una foto clara del equipo</p>
        <form method="POST" enctype="multipart/form-data" id="formEvidencia">
            {% csrf_token %}
            <label class="camera-btn">
                <i class="bi bi-camera" style="font-size: 3rem; color: #1a237e;"></i>
                <p class="mt-2 mb-0 text-muted">Toca para tomar foto</p>
                <input type="file" name="foto" accept="image/*" capture="environment" style="display: none;" onchange="document.getElementById('formEvidencia').submit()">
            </label>
        </form>
        <small class="text-muted mt-3">Esta página expirará en breve</small>
    </div>
</body>
</html>
