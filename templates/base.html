<!-- templates/base.html -->
{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}CRAI UNEMI{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS (LOCAL) -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    
    <!-- Bootstrap Icons (LOCAL) -->
    <link href="{% static 'css/bootstrap-icons.css' %}" rel="stylesheet">
    
    <!-- Estilos base -->
    <link href="{% static 'css/base.css' %}" rel="stylesheet">
    
    <!-- Estilos del loader -->
    <link href="{% static 'css/loader.css' %}" rel="stylesheet">
    
    {% block estilos_extra %}{% endblock %}
</head>
<body>
    
    <!-- LOADER DE CARGA - CRAI UNEMI -->
    <div class="crai-loader" id="craiLoader">
        <div class="loader-contenido">
            <div class="loader-logo">
                <i class="bi bi-book loader-icono"></i>
            </div>
            <div class="loader-ondas">
                <div class="onda onda-1"></div>
                <div class="onda onda-2"></div>
                <div class="onda onda-3"></div>
            </div>
            <div class="loader-texto">
            <div class="loader-marca">
                <span class="letra">C</span>
                <span class="letra">R</span>
                <span class="letra">A</span>
                <span class="letra">I</span>
            </div>
            <div class="loader-unemi">
                <span class="letra-unemi">U</span>
                <span class="letra-unemi">N</span>
                <span class="letra-unemi">E</span>
                <span class="letra-unemi">M</span>
                <span class="letra-unemi">I</span>
            </div>
        </div>
                    <div class="loader-cargando">
                <span>Cargando</span>
                <span class="loader-puntos"></span>
            </div>
        </div>
    </div>
    
    {% block contenido %}{% endblock %}
    
    <!-- Bootstrap 5 JS Bundle (LOCAL) -->
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    
    <!-- Script del loader -->
    <script src="{% static 'js/loader.js' %}"></script>
    <script src="{% static 'js/base.js' %}"></script>
    
    {% block scripts_extra %}{% endblock %}
</body>
</html>
